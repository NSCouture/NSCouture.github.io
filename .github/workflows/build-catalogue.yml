# ─────────────────────────────────────────────────────────────────────────────
# Build Catalogue — fires when images are added/deleted or metadata changes.
# Runs generate.py, commits updated index.html back to main.
# GitHub Pages serves the result automatically.
# ─────────────────────────────────────────────────────────────────────────────
name: Build Catalogue

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "catalogue.json"
      - "scripts/generate.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Regenerate catalogue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run catalogue generator
        run: python scripts/generate.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html catalogue.json
          git diff --staged --quiet || git commit -m "chore: rebuild catalogue [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
