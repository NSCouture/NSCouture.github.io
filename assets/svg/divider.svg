<svg width="400" height="40" viewBox="0 0 400 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line-left, .line-right {
      stroke: currentColor;
      stroke-width: 0.9;
      animation: draw 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .line-right { animation-name: draw-right; }
    .diamond {
      stroke: currentColor;
      stroke-width: 0.9;
      opacity: 0;
      animation: fade-in 0.4s 0.75s ease forwards;
      transform-origin: 200px 20px;
    }
    @keyframes draw {
      from { transform: scaleX(0); transform-origin: 200px 20px; }
      to   { transform: scaleX(1); transform-origin: 200px 20px; }
    }
    @keyframes draw-right {
      from { transform: scaleX(0); transform-origin: 200px 20px; }
      to   { transform: scaleX(1); transform-origin: 200px 20px; }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
  </style>
  <line class="line-left" x1="12" y1="20" x2="188" y2="20" />
  <rect class="diamond" x="194" y="14" width="12" height="12" transform="rotate(45 200 20)" />
  <line class="line-right" x1="212" y1="20" x2="388" y2="20" />
</svg>
