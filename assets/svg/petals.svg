<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .petal {
      transform-box: fill-box;
      transform-origin: center;
      animation: drift 10s ease-in-out infinite;
    }
    .petal:nth-child(2) { animation-delay: -2s; }
    .petal:nth-child(3) { animation-delay: -4s; }
    .petal:nth-child(4) { animation-delay: -6s; }
    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.22; }
      50% { transform: translateY(-10px) rotate(8deg); opacity: 0.4; }
    }
  </style>
  <ellipse class="petal" cx="45" cy="52" rx="16" ry="8" transform="rotate(-24 45 52)" fill="#D4C4A8" opacity="0.28"/>
  <ellipse class="petal" cx="98" cy="38" rx="14" ry="7" transform="rotate(18 98 38)" fill="#8B7355" opacity="0.22"/>
  <ellipse class="petal" cx="126" cy="104" rx="18" ry="8" transform="rotate(-12 126 104)" fill="#D4C4A8" opacity="0.24"/>
  <ellipse class="petal" cx="66" cy="126" rx="15" ry="7" transform="rotate(32 66 126)" fill="#8B7355" opacity="0.2"/>
</svg>
